# version: "3.3"

volumes:
  data:
    driver: local
  filestore:
    driver: local

services:
  hedera_db:
    container_name: hedera_db
    image: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hedera_db
      POSTGRES_PASSWORD: "123"
      POSTGRES_USER: root
    volumes:
      - ./backend-hedera/custodian/init.sql:/docker-entrypoint-initdb.d/init.sql
      - data:/data/postgres

  custodian:
    build:
      context: .
      dockerfile: ./backend-hedera/custodian/Dockerfile
    command: ["yarn", "start:prod"]
    ports:
      - "3000:3000"
    depends_on:
      - hedera_db
    environment:
      CUSTODIAN_PORT: 3002
      GUARDIAN_URL: "http://3.93.78.104:3000"
      DB_HOST: hedera_db
      DB_PORT: 5432
      DB_USERNAME: root
      DB_PASSWORD: "123"
      DB_NAME: hedera_db
    volumes:
      - filestore:/usr/src/app/public
      - ./backend-hedera/custodian/.env:/.env

